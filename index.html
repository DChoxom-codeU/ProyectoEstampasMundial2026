<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>
        Álbum Mundial 2026
    </title>

    <!-- ====================================== -->
    <!-- CSS -->

    <link  rel="stylesheet" href="stylesStampa.css">
        <link  rel="stylesheet" href="styesDefault.css">
            <link  rel="stylesheet" href="stylesResponsive.css">
</head>

<body>
    <!-- ====================================== -->
    <!-- INPUT OCULTO -->

    <input
        type="file"
        id="input-archivo-oculto"
        accept="image/*"
        style="display:none;"
    >
    <!-- ====================================== -->
    <!-- NAVBAR -->

    <header class="navbar">
        <div class="navbar-linea-superior">
            <div class="logo">
                Álbum Mundial 2026 ⚽
            </div>
        </div>
    </header>

    <!-- ====================================== -->
    <!-- CONTENEDOR PRINCIPAL -->

    <main id="grid-jugadores" class="contenedor-principal">
        <!-- ====================================== -->
        <!-- LOADER INICIAL -->
        <!-- ====================================== -->
        <div class="loader-inicial">
            <div class="spinner-icono">⚽</div>
            <p>  Cargando grupos...  </p>
        </div>
    </main>

<div id="modal-estampa" class="modal-overlay">
    <div class="modal-contenido">
        <div class="modal-header">
            <h2 id="modal-nombre">Nombre</h2>
            <p id="modal-album">Álbum: ---</p>
        </div>
      
        <div class="modal-botones">
            <div class="bloque-cantidad">
            <button class="btn-accion btn-restar" onclick="actualizarModal(-1)">-</button>
             <span id="modal-cantidad-valor" class="valor-modal">0</span>
            <button class="btn-accion btn-sumar" onclick="actualizarModal(1)">+</button>
           </div>

            <div class="contenedor-subir">
                <div id="contenedor-boton-camara"></div>
            </div>
            </div>
    </div>
    </div>
</div>
    

    <!-- ====================================== -->
    <!-- SCRIPT -->
    <script src="scriptStampa.js"></script>
    

</body>
</html>
